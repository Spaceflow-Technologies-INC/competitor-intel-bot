name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: polar-land-465511-j7
  GCP_REGION: europe-west1
  GCP_WIF_PROVIDER: projects/795678293866/locations/global/workloadIdentityPools/github-pool/providers/spaceflow-provider
  GCP_DEPLOY_SERVICE_ACCOUNT: github-actions-sa@polar-land-465511-j7.iam.gserviceaccount.com
  GCP_BUILD_SERVICE_ACCOUNT: projects/polar-land-465511-j7/serviceAccounts/github-actions-sa@polar-land-465511-j7.iam.gserviceaccount.com
  CLOUD_RUN_SERVICE: competitor-intel-bot
  CLOUD_RUN_SLACK_SERVICE: competitor-intel-slack
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: competitor-intel-bot@polar-land-465511-j7.iam.gserviceaccount.com
  GCP_SCHEDULER_SERVICE_ACCOUNT: competitor-intel-scheduler@polar-land-465511-j7.iam.gserviceaccount.com
  CLOUD_SQL_INSTANCE: polar-land-465511-j7:europe-west1:pr-logger-db

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: competitor-intel-bot-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source . \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --service-account "$CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT" \
            --build-service-account "$GCP_BUILD_SERVICE_ACCOUNT" \
            --set-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --set-env-vars NODE_ENV=production,OPENAI_MODEL=gpt-5.4-mini,DAILY_DIGEST_HOUR_UTC=6,WEEKLY_DIGEST_DAY_UTC=1,ALERT_SCORE_THRESHOLD=0.75,ENABLE_JOB_ENDPOINTS=true,REQUIRE_SLACK_SIGNATURE=false \
            --update-secrets SLACK_BOT_TOKEN=competitor-intel-slack-bot-token:latest,SLACK_CHANNEL_ID=competitor-intel-slack-channel-id:latest,DATABASE_URL=competitor-intel-database-url:latest,PARALLEL_API_KEY=competitor-intel-parallel-api-key:latest,OPENAI_API_KEY=competitor-intel-openai-api-key:latest,COMPETITOR_SEEDS=competitor-intel-competitor-seeds:latest \
            --cpu 1 \
            --memory 512Mi \
            --max-instances 100 \
            --no-allow-unauthenticated
      - name: Deploy public Slack control service
        run: |
          slack_secret_assignments="SLACK_BOT_TOKEN=competitor-intel-slack-bot-token:latest,SLACK_CHANNEL_ID=competitor-intel-slack-channel-id:latest,DATABASE_URL=competitor-intel-database-url:latest,PARALLEL_API_KEY=competitor-intel-parallel-api-key:latest,OPENAI_API_KEY=competitor-intel-openai-api-key:latest,COMPETITOR_SEEDS=competitor-intel-competitor-seeds:latest"
          slack_secret_flags=(--update-secrets "$slack_secret_assignments" --remove-secrets SLACK_SIGNING_SECRET)
          if gcloud secrets versions access latest --secret competitor-intel-slack-signing-secret --project "$GCP_PROJECT_ID" >/dev/null 2>&1; then
            slack_secret_flags=(--update-secrets "${slack_secret_assignments},SLACK_SIGNING_SECRET=competitor-intel-slack-signing-secret:latest")
          else
            echo "competitor-intel-slack-signing-secret has no usable latest version; Slack routes will stay locked."
          fi
          gcloud run deploy "$CLOUD_RUN_SLACK_SERVICE" \
            --source . \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --service-account "$CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT" \
            --build-service-account "$GCP_BUILD_SERVICE_ACCOUNT" \
            --set-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --update-env-vars NODE_ENV=production,OPENAI_MODEL=gpt-5.4-mini,DAILY_DIGEST_HOUR_UTC=6,WEEKLY_DIGEST_DAY_UTC=1,ALERT_SCORE_THRESHOLD=0.75,ENABLE_JOB_ENDPOINTS=false,REQUIRE_SLACK_SIGNATURE=true \
            "${slack_secret_flags[@]}" \
            --cpu 1 \
            --memory 512Mi \
            --max-instances 20 \
            --no-cpu-throttling \
            --allow-unauthenticated
      - name: Verify Cloud Run revision
        run: |
          latest_ready="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.latestReadyRevisionName)')"
          latest_created="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.latestCreatedRevisionName)')"
          test "$latest_ready" = "$latest_created"
          echo "Ready revision: ${latest_ready}"
          slack_ready="$(gcloud run services describe "$CLOUD_RUN_SLACK_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.latestReadyRevisionName)')"
          slack_created="$(gcloud run services describe "$CLOUD_RUN_SLACK_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.latestCreatedRevisionName)')"
          test "$slack_ready" = "$slack_created"
          echo "Slack ready revision: ${slack_ready}"
      - name: Update Cloud Scheduler jobs
        run: |
          worker_url="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='value(status.url)')"

          upsert_http_scheduler_job() {
            local name="$1"
            local schedule="$2"
            local path="$3"
            local uri="${worker_url}${path}"
            if gcloud scheduler jobs describe "$name" --project "$GCP_PROJECT_ID" --location "$GCP_REGION" >/dev/null 2>&1; then
              gcloud scheduler jobs update http "$name" \
                --project "$GCP_PROJECT_ID" \
                --location "$GCP_REGION" \
                --schedule "$schedule" \
                --time-zone Europe/Istanbul \
                --uri "$uri" \
                --http-method POST \
                --oidc-service-account-email "$GCP_SCHEDULER_SERVICE_ACCOUNT" \
                --oidc-token-audience "$worker_url"
            else
              gcloud scheduler jobs create http "$name" \
                --project "$GCP_PROJECT_ID" \
                --location "$GCP_REGION" \
                --schedule "$schedule" \
                --time-zone Europe/Istanbul \
                --uri "$uri" \
                --http-method POST \
                --oidc-service-account-email "$GCP_SCHEDULER_SERVICE_ACCOUNT" \
                --oidc-token-audience "$worker_url"
            fi
          }

          upsert_http_scheduler_job competitor-intel-collect "0 8 * * *" /jobs/collect
          upsert_http_scheduler_job competitor-intel-daily-digest "* * * * *" /jobs/scheduled-digest
